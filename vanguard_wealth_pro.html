<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Wealth Pro — Standalone Edition</title>
  
  <!-- Preconnect & Load Elegant Google Fonts -->

  <!-- Tailwind Config Customizations -->

      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],

  <!-- React 18, React-DOM 18, and Babel Standalone for direct in-browser JSX parsing -->

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

        display: none !important;

        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }

        width: 100% !important;
        max-width: 100% !important;
        border: none !important;
        box-shadow: none !important;

</head>
<body class="bg-slate-50 dark:bg-[#0a0a0a] text-slate-900 dark:text-[#f5f5f5] transition-colors duration-300 min-h-screen">

  <div id="root"></div>

  <!-- React Babel script block -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Currency configuration & options
    const CURRENCIES = [
      { code: "INR", locale: "en-IN", symbol: "₹", name: "Indian Rupee", flag: "🇮🇳" },
      { code: "USD", locale: "en-US", symbol: "$", name: "US Dollar", flag: "🇺🇸" },
      { code: "EUR", locale: "de-DE", symbol: "€", name: "Euro", flag: "🇪🇺" },
      { code: "GBP", locale: "en-GB", symbol: "£", name: "British Pound", flag: "🇬🇧" },
      { code: "AUD", locale: "en-AU", symbol: "A$", name: "Australian Dollar", flag: "🇦🇺" },
      { code: "CAD", locale: "en-CA", symbol: "C$", name: "Canadian Dollar", flag: "🇨🇦" },
      { code: "AED", locale: "ar-AE", symbol: "د.إ", name: "UAE Dirham", flag: "🇦🇪" },
      { code: "SGD", locale: "en-SG", symbol: "S$", name: "Singapore Dollar", flag: "🇸🇬" }
    ];

    function getCurrencyConfig(code) {
      return CURRENCIES.find((c) => c.code === code) || CURRENCIES[0];
    }

    function formatCurrency(amount, currencyCode) {
      const config = getCurrencyConfig(currencyCode);
      try {
        return new Intl.NumberFormat(config.locale, {
          style: "currency",
          currency: config.code,
          maximumFractionDigits: 0,
        }).format(amount);
      } catch (e) {
        return `${config.symbol}${amount.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
      }
    }

    function getMonthYearString(startDateStr, monthsOffset) {
      const date = startDateStr ? new Date(startDateStr) : new Date();
      if (isNaN(date.getTime())) {
        return "";
      }
      date.setMonth(date.getMonth() + monthsOffset);
      return date.toLocaleDateString(undefined, { month: "short", year: "numeric" });
    }

    // Calculations Projection Algorithm
    function calculateWealthProjection(inputs) {
      const { investment, monthlyContribution, targetAmount, monthlyRate, startDate } = inputs;
      const r = monthlyRate / 100;
      let balance = investment;
      let totalContributions = investment;
      let months = 0;
      const projections = [];

      // Add starting point projection
      projections.push({
        month: 0,
        dateStr: getMonthYearString(startDate, 0),
        contributions: investment,
        profit: 0,
        balance: investment,
      });

      const maxMonths = 3600; // 300 years maximum limit

      while (balance < targetAmount && months < maxMonths) {
        months++;
        const interest = balance * r;
        balance = balance + interest + monthlyContribution;
        totalContributions += monthlyContribution;
        const profit = balance - totalContributions;

        projections.push({
          month: months,
          dateStr: getMonthYearString(startDate, months),
          contributions: totalContributions,
          profit: Math.max(0, profit),
          balance: balance,
        });

        // Safe break to avoid infinite loop on negative/zero rates and contributions
        if (r <= 0 && monthlyContribution <= 0 && balance < targetAmount) {
          break;
        }
      }

      const finalAmount = balance;
      const totalProfit = Math.max(0, finalAmount - totalContributions);
      const roi = totalContributions > 0 ? (totalProfit / totalContributions) * 100 : 0;
      
      const yearsNeeded = months / 12;
      const cagr = yearsNeeded > 0 && investment > 0
        ? (Math.pow(finalAmount / investment, 1 / yearsNeeded) - 1) * 100
        : 0;

      const wholeYears = Math.floor(months / 12);
      const remainingMonths = months % 12;

      const compDate = startDate ? new Date(startDate) : new Date();
      compDate.setMonth(compDate.getMonth() + months);
      const completionDate = compDate.toLocaleDateString(undefined, {
        year: "numeric",
        month: "long",
        day: "numeric",
      });

      return {
        finalAmount,
        totalContributions,
        totalProfit,
        roi,
        cagr,
        monthsNeeded: months,
        yearsNeeded: wholeYears,
        remainingMonths,
        completionDate,
        projections,
      };
    }

    // SVG Pixel-perfect Icons wrapper
    function Icon({ name, size = 16, className = "" }) {
      const icons = {

        share2: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
        filewarning: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
        slidershorizontal: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/><line x1="14" y1="2" x2="14" y2="6"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="16" y1="18" x2="16" y2="22"/></svg>,
        calendar: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,

        checkcircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
        messagesquare: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
        linkedin: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>,
        twitter: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>,
        globe: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
        mail: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
        trendingup: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
        calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
        linechart: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
        barchart3: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>,
        helpcircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12" y1="17" y2="17"/></svg>,
        user: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        moon: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
        sun: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>,
        scale: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.74-1.92 1-3 1s-2.13-.26-3-1Z"/><path d="m2 16 3-8 3 8c-.87.74-1.92 1-3 1s-2.13-.26-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>,
        send: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      };
      return icons[name.toLowerCase()] || null;
    }

    // Dynamic, responsive SVG Chart
    function AnalyticsChart({ projections, currency }) {
      const [hoverIndex, setHoverIndex] = useState(null);
      const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });
      const containerRef = useRef(null);
      const [dimensions, setDimensions] = useState({ width: 600, height: 320 });

      useEffect(() => {
        if (!containerRef.current) return;
        const resizeObserver = new ResizeObserver((entries) => {
          for (let entry of entries) {
            const { width, height } = entry.contentRect;
            setDimensions({
              width: Math.max(width, 300),
              height: Math.max(height, 260),
            });
          }
        });
        resizeObserver.observe(containerRef.current);
        return () => resizeObserver.disconnect();
      }, []);

      if (!projections || projections.length === 0) {
        return (
          <div className="flex items-center justify-center h-64 border-2 border-dashed border-slate-700 rounded-2xl bg-slate-900/40 text-slate-400">
            No projection data available
          </div>
        );
      }

      // Downsample to max 60 points for lightweight plotting
      const maxPoints = 60;
      const step = Math.max(1, Math.floor(projections.length / maxPoints));
      const points = [];
      for (let i = 0; i < projections.length; i += step) {
        points.push(projections[i]);
      }
      if (projections.length > 1 && (projections.length - 1) % step !== 0) {
        points.push(projections[projections.length - 1]);
      }

      const padding = { top: 20, right: 20, bottom: 40, left: 75 };
      const graphWidth = dimensions.width - padding.left - padding.right;
      const graphHeight = dimensions.height - padding.top - padding.bottom;

      const maxBalance = Math.max(...points.map((p) => p.balance), 100);
      const minBalance = 0;
      const yRange = maxBalance - minBalance;

      const getX = (index) => {
        if (points.length <= 1) return padding.left;
        return padding.left + (index / (points.length - 1)) * graphWidth;
      };

      const getY = (val) => {
        return padding.top + graphHeight - ((val - minBalance) / yRange) * graphHeight;
      };

      const balancePoints = points.map((p, idx) => `${getX(idx)},${getY(p.balance)}`);
      const balancePath = `M ${balancePoints.join(" L ")}`;

      const balanceAreaPath = points.length > 0
        ? `${balancePath} L ${getX(points.length - 1)},${padding.top + graphHeight} L ${getX(0)},${padding.top + graphHeight} Z`
        : "";

      const contrPoints = points.map((p, idx) => `${getX(idx)},${getY(p.contributions)}`);
      const contrPath = `M ${contrPoints.join(" L ")}`;

      const handleMouseMove = (e) => {
        if (!containerRef.current) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left - padding.left;

        if (x < 0 || x > graphWidth) {
          setHoverIndex(null);
          return;
        }

        const pct = x / graphWidth;
        const idx = Math.min(
          points.length - 1,
          Math.max(0, Math.round(pct * (points.length - 1)))
        );

        setHoverIndex(idx);
        setTooltipPos({
          x: getX(idx) + 12,
          y: Math.min(getY(points[idx].balance) - 20, dimensions.height - 120),
        });
      };

      const handleMouseLeave = () => {
        setHoverIndex(null);
      };

      const yTicksCount = 5;
      const yTicks = Array.from({ length: yTicksCount }, (_, i) => {
        const val = minBalance + (yRange * i) / (yTicksCount - 1);
        return { val, y: getY(val) };
      });

      const xTicksCount = Math.min(points.length, 5);
      const xTicksIndices = Array.from({ length: xTicksCount }, (_, i) =>
        Math.round((i * (points.length - 1)) / (xTicksCount - 1))
      );

      return (
        <div ref={containerRef} className="w-full h-[320px] relative select-none">
          <svg
            width="100%"
            height="100%"
            viewBox={`0 0 ${dimensions.width} ${dimensions.height}`}
            className="overflow-visible cursor-crosshair"
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
          >
            <defs>
              <linearGradient id="balanceGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#10b981" stopOpacity="0.25" />
                <stop offset="100%" stopColor="#10b981" stopOpacity="0.0" />
              </linearGradient>
              <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#059669" />
                <stop offset="100%" stopColor="#10b981" />
              </linearGradient>
            </defs>

            {/* Grid lines */}
            {yTicks.map((tick, i) => (
              <g key={`y-grid-${i}`} className="opacity-10">
                <line
                  x1={padding.left}
                  y1={tick.y}
                  x2={dimensions.width - padding.right}
                  y2={tick.y}
                  stroke="currentColor"
                  strokeWidth="1"
                  strokeDasharray="4 4"
                />
                <text
                  x={padding.left - 10}
                  y={tick.y + 4}
                  fill="currentColor"
                  fontSize="11"
                  className="font-mono text-slate-400 dark:text-white/40"
                  textAnchor="end"
                >
                  {formatCurrency(tick.val, currency)}
                </text>
              </g>
            ))}

            {/* X Labels */}
            {xTicksIndices.map((idx, i) => {
              const pt = points[idx];
              if (!pt) return null;
              return (
                <text
                  key={`x-tick-${i}`}
                  x={getX(idx)}
                  y={dimensions.height - padding.bottom + 20}
                  fill="currentColor"
                  fontSize="11"
                  className="font-sans text-slate-400 dark:text-white/40"
                  textAnchor="middle"
                >
                  {pt.dateStr}
                </text>
              );
            })}

            {/* Shaded Area */}
            <path d={balanceAreaPath} fill="url(#balanceGrad)" />

            {/* Invested Capital Line */}
            <path
              d={contrPath}
              fill="none"
              stroke="#94a3b8"
              strokeWidth="2"
              strokeDasharray="5 5"
              className="opacity-40"
            />

            {/* Compound Growth Balance Line */}
            <path
              d={balancePath}
              fill="none"
              stroke="url(#lineGrad)"
              strokeWidth="3.5"
              strokeLinecap="round"
              strokeLinejoin="round"
            />

            {/* Tooltip Dot and guides */}
            {hoverIndex !== null && points[hoverIndex] && (
              <g>
                <line
                  x1={getX(hoverIndex)}
                  y1={padding.top}
                  x2={getX(hoverIndex)}
                  y2={dimensions.height - padding.bottom}
                  stroke="#10b981"
                  strokeWidth="1"
                  className="opacity-40"
                />
                <circle
                  cx={getX(hoverIndex)}
                  cy={getY(points[hoverIndex].balance)}
                  r="6"
                  fill="#10b981"
                  stroke="#ffffff"
                  strokeWidth="2"
                />
                <circle

          } else {
